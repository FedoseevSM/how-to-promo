name: Deploy

on:
  push:
    branches:
      - "master"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies and generate lockfile
      run: |
        if [ ! -f package-lock.json ]; then
          npm install
        else
          npm ci
        fi

    - id: build-publish
      uses: bitovi/github-actions-react-to-github-pages@v1.2.3
      with:
        path: dist
